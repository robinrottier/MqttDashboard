# Production compose: pulls pre-built image from GHCR.
# Usage: docker compose -f docker-compose.production.yml up -d
services:
  mqttdashboard:
    image: ghcr.io/robinrottier/mqttdashboard:latest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - MqttSettings__Broker=your-mqtt-broker-host
      - MqttSettings__Port=1883
      - MqttSettings__Username=
      - MqttSettings__Password=
      - DiagramStorage__DataDirectory=/app/data
      - AllowedPathBase=
      # Render mode: Auto (default), WebAssembly, Server (no WASM download)
      - RenderMode=Auto
      # Set to true for a view-only public deployment (no edit UI, write APIs blocked)
      - ReadOnly=false
      # Per-port read-only: e.g. ReadOnlyPorts=8080 with ASPNETCORE_URLS=http://+:8080;http://+:8081
      # serves read-only on 8080 and editable on 8081 from the same process (shared MQTT/cache).
      - ReadOnlyPorts=
    restart: unless-stopped
