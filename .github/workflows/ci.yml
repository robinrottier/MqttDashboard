name: CI

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # needed for MinVer to read git tags

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore workloads
        run: dotnet workload install wasm-tools

      - name: Build
        run: dotnet build MqttDashboard.slnx -c Release

      - name: Test
        run: dotnet test MqttDashboard.slnx -c Release --no-build --verbosity normal
