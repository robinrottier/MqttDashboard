name: Patch Release

# Bumps the patch component of the latest stable version tag and pushes it.
# Then explicitly dispatches the "Create Release" and "Build and Push Docker Image" workflows
# via the GitHub API (GITHUB_TOKEN push alone won't trigger other workflows — GitHub anti-loop rule).
# For a major or minor bump, create the tag manually: git tag vX.Y.0 && git push origin vX.Y.0

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write    # needed to dispatch other workflows via GITHUB_TOKEN

jobs:
  bump-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # needed to see all tags

      - name: Compute next patch version
        id: version
        run: |
          # Find the latest stable semver tag (exact vX.Y.Z — no pre-release suffix)
          latest=$(git tag --list --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1)

          if [ -z "$latest" ]; then
            next="v0.0.1"
          else
            version="${latest#v}"
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)
            next="v${major}.${minor}.$((patch + 1))"
          fi

          echo "Previous tag : ${latest:-none}"
          echo "Next tag     : $next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Dispatch release and docker workflows
        # GITHUB_TOKEN push won't trigger on:push:tags in other workflows (GitHub anti-loop).
        # Explicitly dispatch them via the API — workflow_dispatch works with GITHUB_TOKEN.
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          AUTH="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"

          for workflow in release.yml docker.yml; do
            echo "Dispatching $workflow at ref $TAG"
            curl -s -X POST \
              -H "$AUTH" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/$workflow/dispatches" \
              -d "{\"ref\":\"$TAG\"}"
          done
